version: 2

models:
  - name: stg_coin_prices
    description: "Cleaned and renamed version of raw coin prices from CoinGecko API"
    columns:
      - name: coin_id
        description: "Unique identifier for each coin (e.g. 'bitcoin')"
        data_tests:
          - unique
          - not_null
      - name: symbol
        description: "Short ticker symbol (e.g. 'btc')"
        data_tests:
          - not_null
      - name: current_price
        description: "Current price in USD"
        data_tests:
          - not_null
      - name: last_updated
        description: "Timestamp of when CoinGecko last updated this coin's data"
        data_tests:
          - not_null

  - name: silver_coin_prices
    description: "Validated Silver layer - only clean quality-checked rows"
    columns:
      - name: coin_id
        data_tests:
          - unique
          - not_null
      - name: current_price
        data_tests:
          - not_null
      - name: data_quality_flag
        data_tests:
          - not_null
          - accepted_values:
              values: ['valid', 'flagged']
      - name: data_tier
        data_tests:
          - not_null
